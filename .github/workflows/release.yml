name: Release
on: [push, pull_request] 

permissions:
  contents: write
 
jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true 
      - name: Fetch next version
        id: nextVersion
        uses: VisualPinball/next-version-action@v0
        with:
          tagPrefix: 'v'
          path: ./Packages/NativeTrees
      - name: Bump
        if: ${{ steps.nextVersion.outputs.isBump == 'true' }} 
        run: |
          cd ./Packages/NativeTrees
          npm version ${{ steps.nextVersion.outputs.nextVersion }} --no-git-tag-version    
      - name: Commit
        id: commit
        if: ${{ steps.nextVersion.outputs.isBump == 'true' }} 
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./Packages/NativeTrees/package.json
          git commit -m "release: ${{ steps.nextVersion.outputs.nextTag }}."
          git push
          commitish=$(git rev-parse HEAD)
          echo "commitish=${commitish}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        run: |
          commitish="${{ steps.commit.outputs.commitish }}"
          if [ -z "$commitish" ]; then
            commitish="${GITHUB_SHA}"
          fi

          prerelease_args=()
          if [ "${{ steps.nextVersion.outputs.isPrerelease }}" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          gh release create "${{ steps.nextVersion.outputs.nextTag }}" \
            --title "${{ steps.nextVersion.outputs.nextTag }}" \
            --target "$commitish" \
            "${prerelease_args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dispatch:
    runs-on: ubuntu-latest
    needs: [ release ]
    if: github.repository == 'VisualPinball/NativeTrees' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_PAT }}
          event-type: release-complete
          client-payload: '{"artifacts_run_id": "${{ github.run_id }}"}'
